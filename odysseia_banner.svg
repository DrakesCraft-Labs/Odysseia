<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="50%" stop-color="#121824"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </linearGradient>

    <!-- Rust Orange & Cyber Cyan Accent Gradients -->
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF512F"/>
      <stop offset="100%" stop-color="#F09819"/>
    </linearGradient>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE000"/>
      <stop offset="100%" stop-color="#799F0C"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="420" fill="url(#bgGrad)" rx="16"/>
  <rect width="1200" height="420" fill="url(#grid)" rx="16"/>

  <!-- Glowing Geometric Accent Lines -->
  <path d="M -50 350 L 300 -50" stroke="url(#rustGrad)" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <path d="M 900 470 L 1250 120" stroke="url(#cyanGrad)" stroke-width="2" stroke-opacity="0.3" fill="none"/>

  <!-- Central Emblem / Mythic Crest -->
  <g transform="translate(600, 140)" filter="url(#neonGlow)">
    <!-- Outer Shield Hexagon -->
    <polygon points="0,-75 65,-37 65,37 0,75 -65,37 -65,-37" fill="none" stroke="url(#rustGrad)" stroke-width="3" opacity="0.8"/>
    <!-- Inner Core Hexagon -->
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="rgba(18, 24, 36, 0.9)" stroke="url(#cyanGrad)" stroke-width="2"/>
    
    <!-- Rust Crab + Mythic Crown Symbol -->
    <text x="0" y="16" font-family="'Segoe UI', Roboto, sans-serif" font-size="44" text-anchor="middle" fill="#FF7B00">🦀</text>
  </g>

  <!-- Main Title -->
  <text x="600" y="275" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="52" letter-spacing="6" text-anchor="middle" fill="#FFFFFF" filter="url(#softShadow)">
    ODYSSEIA ENGINE
  </text>

  <!-- Subtitle -->
  <text x="600" y="315" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600" font-size="18" letter-spacing="3" text-anchor="middle" fill="url(#cyanGrad)">
    RUST 2021 WORKSPACE  •  JAVA 21 FFM API  •  PURPUR 1.21.11 &amp; STAR
  </text>

  <!-- Tech Badges Bar -->
  <g transform="translate(600, 365)">
    <!-- Badge 1: Rust Engine -->
    <g transform="translate(-240, 0)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="rgba(255, 81, 47, 0.15)" stroke="url(#rustGrad)" stroke-width="1.5"/>
      <text x="0" y="5" font-family="sans-serif" font-weight="700" font-size="12" fill="#FF512F" text-anchor="middle">⚡ RUST CORE</text>
    </g>

    <!-- Badge 2: Java 21 FFM -->
    <g transform="translate(-80, 0)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="rgba(0, 242, 254, 0.15)" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <text x="0" y="5" font-family="sans-serif" font-weight="700" font-size="12" fill="#00F2FE" text-anchor="middle">☕ JAVA 21 FFM</text>
    </g>

    <!-- Badge 3: 20 Bosses -->
    <g transform="translate(80, 0)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="rgba(255, 224, 0, 0.15)" stroke="url(#goldGrad)" stroke-width="1.5"/>
      <text x="0" y="5" font-family="sans-serif" font-weight="700" font-size="12" fill="#FFE000" text-anchor="middle">⚔️ 20 BOSSES</text>
    </g>

    <!-- Badge 4: Star Server Daemon -->
    <g transform="translate(240, 0)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="rgba(79, 172, 254, 0.15)" stroke="#4FACFE" stroke-width="1.5"/>
      <text x="0" y="5" font-family="sans-serif" font-weight="700" font-size="12" fill="#4FACFE" text-anchor="middle">🚀 STAR SERVER</text>
    </g>
  </g>
</svg>
