<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#1b1036"/>
      <stop offset="55%" stop-color="#0a0816"/>
      <stop offset="100%" stop-color="#03040a"/>
    </radialGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="35%" stop-color="#f7c948"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <linearGradient id="ember" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="45%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>

    <linearGradient id="void" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hardGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="g1"/>
      <feGaussianBlur stdDeviation="10" result="g2"/>
      <feMerge>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes ringSpinReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.95; }
    }
    @keyframes shardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes emberFlicker {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .spin {
      transform-origin: 256px 256px;
      animation: ringSpin 34s linear infinite;
    }
    .spin-reverse {
      transform-origin: 256px 256px;
      animation: ringSpinReverse 26s linear infinite;
    }
    .pulse {
      animation: pulse 5s ease-in-out infinite;
    }
    .float-a {
      animation: shardFloat 4.2s ease-in-out infinite;
    }
    .float-b {
      animation: shardFloat 5.6s ease-in-out infinite;
    }
    .flicker {
      animation: emberFlicker 2.6s ease-in-out infinite;
    }
  </style>

  <rect width="512" height="512" fill="url(#bg)"/>

  <circle cx="256" cy="256" r="196" fill="url(#halo)" class="pulse"/>

  <g opacity="0.9">
    <circle cx="80" cy="104" r="2" fill="#fff"/>
    <circle cx="138" cy="72" r="1.5" fill="#fde68a"/>
    <circle cx="410" cy="92" r="2" fill="#fff"/>
    <circle cx="444" cy="168" r="1.5" fill="#c4b5fd"/>
    <circle cx="98" cy="362" r="2" fill="#38bdf8"/>
    <circle cx="426" cy="382" r="2" fill="#fff"/>
    <circle cx="186" cy="430" r="1.5" fill="#fca5a5"/>
    <circle cx="334" cy="448" r="1.5" fill="#fde68a"/>
  </g>

  <circle cx="256" cy="256" r="184" fill="none" stroke="url(#gold)" stroke-width="2.4" stroke-dasharray="8 16" opacity="0.45" class="spin"/>
  <circle cx="256" cy="256" r="154" fill="none" stroke="url(#void)" stroke-width="2.6" opacity="0.52" class="spin-reverse"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.92" filter="url(#softGlow)"/>

  <g opacity="0.42" stroke="#f8d57e" stroke-width="1.2" class="spin">
    <line x1="256" y1="104" x2="334" y2="166"/>
    <line x1="334" y1="166" x2="350" y2="256"/>
    <line x1="350" y1="256" x2="310" y2="356"/>
    <line x1="310" y1="356" x2="256" y2="408"/>
    <line x1="256" y1="408" x2="198" y2="360"/>
    <line x1="198" y1="360" x2="162" y2="256"/>
    <line x1="162" y1="256" x2="180" y2="166"/>
    <line x1="180" y1="166" x2="256" y2="104"/>
  </g>

  <g fill="url(#gold)" filter="url(#softGlow)" class="spin">
    <circle cx="256" cy="104" r="4"/>
    <circle cx="334" cy="166" r="3.5"/>
    <circle cx="350" cy="256" r="4"/>
    <circle cx="310" cy="356" r="3.5"/>
    <circle cx="256" cy="408" r="4.5"/>
    <circle cx="198" cy="360" r="3.5"/>
    <circle cx="162" cy="256" r="4"/>
    <circle cx="180" cy="166" r="3.5"/>
  </g>

  <g filter="url(#hardGlow)">
    <path d="M256 138 L280 228 L374 256 L280 284 L256 374 L232 284 L138 256 L232 228 Z" fill="url(#gold)"/>
    <path d="M256 176 L270 242 L336 256 L270 270 L256 336 L242 270 L176 256 L242 242 Z" fill="#fff7d6"/>
  </g>

  <g class="float-a">
    <path d="M168 196 C188 166, 224 154, 250 164 C224 172, 208 192, 206 218 C202 246, 216 270, 242 286 C186 286, 144 240, 168 196 Z" fill="url(#ember)" opacity="0.95" filter="url(#softGlow)"/>
  </g>

  <g class="float-b">
    <path d="M310 190 L350 154 L366 176 L336 206 L372 234 L354 254 L316 228 Z" fill="url(#void)" opacity="0.95" filter="url(#softGlow)"/>
  </g>

  <g class="flicker">
    <path d="M258 208 C270 220, 278 234, 278 250 C278 272, 264 290, 256 302 C248 290, 234 272, 234 250 C234 234, 242 220, 254 208 C252 224, 258 232, 264 240 C270 232, 272 220, 258 208 Z" fill="url(#ember)" filter="url(#hardGlow)"/>
  </g>

  <g filter="url(#softGlow)" opacity="0.85">
    <path d="M116 332 Q128 340 116 348 Q104 340 116 332 Z" fill="#fff"/>
    <path d="M394 132 Q406 140 394 148 Q382 140 394 132 Z" fill="#fde68a"/>
    <path d="M388 368 Q400 376 388 384 Q376 376 388 368 Z" fill="#c4b5fd"/>
  </g>
</svg>
