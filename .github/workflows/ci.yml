name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: odysseia-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-build:
    name: Test y build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ejecutar tests y empaquetar
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Publicar JAR
        uses: actions/upload-artifact@v7
        with:
          name: Odysseia-${{ github.sha }}
          path: target/Odysseia-*.jar
          if-no-files-found: error
          retention-days: 14
