name: Odysseia
version: 1.1.0
main: org.metamechanists.odysseia.Odysseia
api-version: 1.21
description: Suite principal de sistemas, tienda, kits, eventos y administracion de DrakesCraft.
authors: [JackStar]
softdepend:
  - PlaceholderAPI
  - LuckPerms
  - Essentials
  - Vault
  - ProtectionStones
  - Slimefun
  - floodgate

commands:
  papademar:
    description: Entrega la legendaria Papa de mar.
    permission: odysseia.papademar
    aliases: [pdm]
  lenador:
    description: Invoca al Leñador Loco de manera silenciosa.
    permission: staff.lumberjack.spawn
    usage: /lenador [nivel]
  vanish:
    description: Desvanecimiento creativo para moderadores.
    permission: odysseia.vanish
    aliases: [v]
  boss:
    description: Comando administrativo para gestionar jefes míticos.
    permission: odysseia.boss.admin
    usage: /boss spawn <circe|polifemo>
  odysseia:
    description: Comando principal de administración de Odysseia.
    permission: odysseia.reload
    usage: /odysseia <reload|status>
  odysseiaannounce:
    description: Dispara el anuncio público de Discord de una compra entregada (uso desde Tebex).
    permission: odysseia.store.announce
    usage: /odysseiaannounce <nick> <producto>
  odysseiapurchase:
    description: Motor transaccional de entregas de tienda.
    permission: odysseia.purchase.admin
    usage: /odysseiapurchase <deliver|test|status|pending|retry|history|validate|dry-run|refund|chargeback> ...
  daily:
    description: Muestra la racha de recompensa diaria.
  restart30:
    description: Reinicio seguro con guardado y respaldo de inventarios.
    permission: drakes.admin
  odysseiapendingkit:
    description: Encola un rango y kit para entrega online u offline.
    permission: odysseia.purchase.admin
    usage: /odysseiapendingkit <jugador> <kit>
  drakeswarn:
    description: Gestiona advertencias del filtro de chat.
    aliases: [dwarn]
    permission: drakes.staff
  kitgive:
    description: Entrega solo los ítems de un kit para pruebas administrativas.
    permission: odysseia.kitgive
    usage: /kitgive <kit> o /kitgive <jugador> <kit>
  kit:
    description: Reclama un kit mensual configurado por Odysseia.
    aliases: [kits]
    permission: odysseia.kit.use
    usage: /kit <nombre>
  drakestienda:
    description: Abre el hub nativo de comercio de DrakesCraft.
    aliases: [tienda, menu, shop, mercado, kitsvip, kits_vip, kits-vip]
    usage: /tienda [kits]
permissions:
  odysseia.reload:
    description: Permite recargar config.yml, purchases.yml y servicios runtime.
    default: op
  odysseia.purchase.admin:
    description: Control total del motor de compras.
    default: op
  odysseia.kitgive:
    description: Permite probar kits sin entregar dinero, rango o protección.
    default: op
  odysseia.kit.use:
    description: Permite consultar y reclamar kits configurados por Odysseia.
    default: true
  odysseia.kit.inicial:
    description: Permite reclamar una vez el kit inicial de DrakesCraft.
    default: true
  odysseia.fastmachines.bypass:
    description: Permite usar Fast Machines dentro de protecciones ajenas.
    default: op
