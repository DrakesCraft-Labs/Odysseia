polis-baseline:
  # Only default-only users become Polis; staff and permanent ranks remain unchanged.
  enabled: true
  default-group: default
  base-group: polis
  reconcile-interval-seconds: 60

# Seguridad de FastMachines: el addon no valida por sí mismo la región de la máquina.
fast-machines-protection:
  enabled: true
  bypass-permission: odysseia.fastmachines.bypass
  denied-message: "&cNo puedes usar las Fast Machines de otra protección."

# La compra SFMaster entrega la guía Cheat original y la vuelve inutilizable al expirar el pase.
sfmaster-guide:
  enabled: true
  block-cheat-command: true
  cleanup-interval-seconds: 30
