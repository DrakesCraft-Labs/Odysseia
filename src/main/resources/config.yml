# ╔══════════════════════════════════════════════╗
# ║             Odysseia — config.yml            ║
# ╚══════════════════════════════════════════════╝

# Habilitar envio de eventos a Discord
discord:
  enabled: true
  # Pegar aqui la URL completa del webhook de Discord
  webhook-url: "REPLACE_ME"
  # Webhook secundario opcional para eventos de moderacion (ban/kick)
  webhook-moderation-url: "REPLACE_ME"

# ─────────────────────────────────────────────
#  Ciclo de Prefijos del Propietario (Owner)
# ─────────────────────────────────────────────
owner-cycle:
  # Habilitar el placeholder de PAPI %odysseia_owner_prefix%
  enabled: true
  # Intervalo para alternar visualmente (minutos)
  interval-minutes: 30
  # Prefijos a alternar para odiseo
  odiseo:
    prefix-a: "&8✠ &6&lᴏᴅɪsᴇᴏ &8✦ &6&o"
    prefix-b: "&8✠ &4&lᴅᴜᴇñᴏ &8✦ &4"
  # Prefijos a alternar para penelope
  penelope:
    prefix-a: "&d✦ &d&lᴘᴇɴᴇʟᴏᴘᴇ &8✦ &d"
    prefix-b: "&d✦ &d&lᴅᴜᴇñᴀ &8✦ &d"

# ─────────────────────────────────────────────
#  Efectos de Armadura de Rangos
# ─────────────────────────────────────────────
# Se aplican si el jugador tiene el set completo y el permiso correspondiente
armor-effects:
  refresh-interval-seconds: 90
  effect-duration-seconds: 180
  
  # Hercules (VIP 1) - requiere essentials.kits.hercules y full diamante
  hercules:
    speed: 1
    resistance: 1
    
  # Hestia (VIP 2) - requiere essentials.kits.hestia y full diamante
  hestia:
    speed: 2
    health-boost: 1
    saturation: true
    
  # Hermes (VIP 3) - requiere essentials.kits.hermes y full diamante
  hermes:
    speed: 4
    health-boost: 1
    saturation: true
    
  # Hefesto (VIP 4) - requiere essentials.kits.hefesto y full netherite
  hefesto:
    speed: 2
    health-boost: 2
    fire-resistance: true
    saturation: true
    
  # Artemisa (VIP 5) - requiere essentials.kits.artemisa y full netherite
  artemisa:
    speed: 3
    health-boost: 2
    strength: 1
    saturation: true
    
  # Afrodita (VIP 6) - requiere essentials.kits.afrodita y full netherite
  afrodita:
    speed: 3
    health-boost: 3
    strength: 1
    regeneration: 1
    saturation: true
    
  # Zeus (VIP 7) - requiere essentials.kits.zeus y full netherite
  zeus:
    speed: 4
    health-boost: 4
    strength: 2
    resistance: 1
    saturation: true

# ─────────────────────────────────────────────
#  Reliquias Personalizadas
# ─────────────────────────────────────────────
papa-de-mar:
  # Valores al consumir la Papa de mar
  food-restored: 1
  saturation-restored: 8.4
  # Tiempo de entrega automatica a todos los jugadores (minutos)
  delivery-interval-minutes: 15

# ─────────────────────────────────────────────
#  ChatGames Scheduler
# ─────────────────────────────────────────────
chatgames:
  # Rango de tiempo aleatorio para lanzar un juego (minutos)
  min-interval: 15
  max-interval: 30

# ─────────────────────────────────────────────
#  Presencia y Eventos (DrakesLabPresence)
# ─────────────────────────────────────────────
presence:
  enabled: true
  # Identificador legible en mensajes (opcional, por defecto el del servidor)
  server-label: ""
  # Intervalo de latido en minutos (minimo 15)
  heartbeat-minutes: 15
  # Segundos de espera tras reload/arranque antes del primer POST
  startup-delay-seconds: 60
  # Eventos especificos a enviar
  events:
    server-startup: true
    server-shutdown: true
    player-join: true
    player-quit: true
    player-death: true
    advancement: true
    rate-limit-per-minute: 12

# ─────────────────────────────────────────────
#  Entrega Automática de Tienda (StoreManager)
# ─────────────────────────────────────────────
store:
  enabled: true
  # URL base de la API de la tienda (Fastify)
  api-url: "https://web.drakescraft.cl/api/store"
  # Clave API secreta (debe coincidir con STORE_API_KEY en el .env)
  api-key: "REPLACE_ME_STORE_API_KEY"
  # Frecuencia de verificación en segundos
  poll-interval-seconds: 60
  # Webhook para anunciar compras en Discord de forma pública
  announcement-webhook-url: "REPLACE_ME"
  # Mensaje de felicitaciones en el chat in-game (Soporta códigos de color '&')
  chat-announcement: "&6&l⚡ &e¡Felicidades &b{player} &eha adquirido &a{product} &een la tienda! ¡Gracias por apoyar al servidor! &6&l⚡"
  # Mensaje del webhook de Discord
  discord-announcement: "🎉 **¡Felicidades {player} ha comprado {product} en el servidor! ¡Gracias por mantener el servidor vivo!** 🎉"
  
  # Comandos a ejecutar por cada producto de la tienda
  # {player} se reemplazará por el nick exacto del jugador
  packages:
    hercules:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hercules 30d accumulate"
        - "eco give {player} 25000"
        - "kit hercules {player}"
        - "msg {player} &a¡Gracias por comprar el rango Hércules!"
    hestia:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hestia 30d accumulate"
        - "eco give {player} 50000"
        - "kit hestia {player}"
        - "msg {player} &a¡Gracias por comprar el rango Hestia!"
    hermes:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hermes 30d accumulate"
        - "eco give {player} 100000"
        - "kit hermes {player}"
        - "msg {player} &a¡Gracias por comprar el rango Hermes!"
    hefesto:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hefesto 30d accumulate"
        - "eco give {player} 175000"
        - "kit hefesto {player}"
        - "msg {player} &a¡Gracias por comprar el rango Hefesto!"
    artemisa:
      require-online: true
      commands:
        - "lp user {player} parent addtemp artemisa 30d accumulate"
        - "eco give {player} 300000"
        - "kit artemisa {player}"
        - "msg {player} &a¡Gracias por comprar el rango Artemisa!"
    afrodita:
      require-online: true
      commands:
        - "lp user {player} parent addtemp afrodita 30d accumulate"
        - "eco give {player} 500000"
        - "kit afrodita {player}"
        - "msg {player} &a¡Gracias por comprar el rango Afrodita!"
    zeus:
      require-online: true
      commands:
        - "lp user {player} parent addtemp zeus 30d accumulate"
        - "eco give {player} 1000000"
        - "kit zeus {player}"
        - "msg {player} &a¡Gracias por comprar el rango Zeus!"
    # Subrangos (Categoría 2)
    minero:
      require-online: true
      commands:
        - "lp user {player} parent addtemp minero 30d accumulate"
        - "kit minero {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Minero!"
    cazador:
      require-online: true
      commands:
        - "lp user {player} parent addtemp cazador 30d accumulate"
        - "kit cazador {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Cazador!"
    constructor:
      require-online: true
      commands:
        - "lp user {player} parent addtemp constructor 30d accumulate"
        - "kit constructor {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Constructor!"
    lenador:
      require-online: true
      commands:
        - "lp user {player} parent addtemp lenador 30d accumulate"
        - "kit lenador {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Leñador!"
    alquimista:
      require-online: true
      commands:
        - "lp user {player} parent addtemp alquimista 30d accumulate"
        - "kit alquimista {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Alquimista!"
    nomada:
      require-online: true
      commands:
        - "lp user {player} parent addtemp nomada 30d accumulate"
        - "kit nomada {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Nómada!"
    # Dragmas (Categoría 3 de la tienda web - 3 paquetes definidos)
    dragmas-saco:
      require-online: true
      commands:
        - "eco give {player} 50000"
        - "msg {player} &a¡Recibiste tu Saco de 50,000 Dragmas!"
    dragmas-cofre:
      require-online: true
      commands:
        - "eco give {player} 250000"
        - "msg {player} &a¡Recibiste tu Cofre de 250,000 Dragmas!"
    dragmas-anfora:
      require-online: true
      commands:
        - "eco give {player} 1000000"
        - "msg {player} &a¡Recibiste tu Ánfora de 1,000,000 Dragmas!"
