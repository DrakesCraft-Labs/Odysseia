# ╔══════════════════════════════════════════════╗
# ║             Odysseia — config.yml            ║
# ╚══════════════════════════════════════════════╝

# Habilitar envio de eventos a Discord
discord:
  enabled: true
  # Canal de actualizaciones: solo estado operativo y eventos relevantes del servidor.
  webhook-url: "REPLACE_ME"
  # Canal de moderación: baneos, expulsiones reales y accesos bloqueados.
  # Nunca hace fallback al canal de actualizaciones.
  webhook-moderation-url: "REPLACE_ME"

# Integraciones opcionales. Odysseia sigue funcionando aunque el plugin externo no exista.
integrations:
  diosesdrakes:
    boss-rewards:
      enabled: true

# Telemetría operativa hacia Star. No interviene en compras ni almacena datos de jugadores.
star-monitor:
  enabled: false
  endpoint: "https://web.drakescraft.cl/api/odysseia/events"
  signing-secret: "REPLACE_ME"
  # Archivo privado dentro de plugins/Odysseia; no versionar ni copiar al repositorio.
  signing-secret-file: "star-monitor.secret"
  heartbeat-interval-seconds: 60

# ─────────────────────────────────────────────
# Eventos de terror limitados a mundos explícitos con jugadores presentes.
horror-night:
  enabled: true
  worlds: [world]

# ─────────────────────────────────────────────
#  Ciclo de Prefijos del Propietario (Owner)
# ─────────────────────────────────────────────
owner-cycle:
  # Habilitar el placeholder de PAPI %odysseia_owner_prefix%
  enabled: true
  # Intervalo para alternar visualmente (minutos)
  interval-minutes: 30
  # Prefijos a alternar para odiseo
  odiseo:
    prefix-a: "&8✠ &6&lᴏᴅɪsᴇᴏ &8✦ &6&o"
    prefix-b: "&8✠ &4&lᴅᴜᴇñᴏ &8✦ &4"
  # Prefijos a alternar para penelope
  penelope:
    prefix-a: "&d✦ &d&lᴘᴇɴᴇʟᴏᴘᴇ &8✦ &d"
    prefix-b: "&d✦ &d&lᴅᴜᴇñᴀ &8✦ &d"

# ─────────────────────────────────────────────
#  Efectos de Armadura de Rangos
# ─────────────────────────────────────────────
# Se aplican si el jugador tiene el set completo y el permiso correspondiente
armor-effects:
  refresh-interval-seconds: 30
  effect-duration-seconds: 180
  
  # Hercules (VIP 1) - requiere drakes.kit.hercules y full diamante
  hercules:
    speed: 1
    resistance: 1
    
  # Hestia (VIP 2) - requiere drakes.kit.hestia y full diamante
  hestia:
    speed: 2
    health-boost: 1
    saturation: true
    
  # Hermes (VIP 3) - requiere drakes.kit.hermes y full diamante
  hermes:
    speed: 4
    health-boost: 1
    saturation: true
    
  # Hefesto (VIP 4) - requiere drakes.kit.hefesto y full netherite
  hefesto:
    speed: 2
    health-boost: 2
    fire-resistance: true
    saturation: true
    
  # Artemisa (VIP 5) - requiere drakes.kit.artemisa y full netherite
  artemisa:
    speed: 3
    health-boost: 2
    strength: 1
    saturation: true
    
  # Afrodita (VIP 6) - requiere drakes.kit.afrodita y full netherite
  afrodita:
    speed: 3
    health-boost: 3
    strength: 1
    regeneration: 1
    saturation: true
    
  # Zeus (VIP 7) - requiere drakes.kit.zeus y full netherite
  zeus:
    speed: 4
    health-boost: 4
    strength: 2
    resistance: 1
    saturation: true

# ─────────────────────────────────────────────
#  Reliquias Personalizadas
# ─────────────────────────────────────────────
papa-de-mar:
  # Valores al consumir la Papa de mar
  food-restored: 1
  saturation-restored: 8.4
  # Item entregado por el scheduler y por /papademar.
  item:
    material: BAKED_POTATO
    name: "&6&l✦ Papa de mar ✦"
    lore:
      - "&7Relicario legendario de Drakes."
      - "&7Ha cruzado temporadas, guerras y treguas."
      - "&7A veces se canjeó por llaves ante aldeanos."
      - "&7A veces fue comida, spam y pura leyenda."
      - "&8Dicen que con esta papa terminó una guerra."
      - "&8Y que quien la porta carga historia en las manos."
    # Formato: ENCHANTMENT:LEVEL. Dejar [] para no encantar.
    enchantments:
      - VANISHING_CURSE:1
  delivery:
    enabled: true
    # Tiempo de entrega automática a todos los jugadores (minutos).
    interval-minutes: 15
    message: "&eRecibiste la &6&l✦ Papa de mar ✦&e."
  # Compatibilidad con configs viejas; si existe delivery.interval-minutes se usa primero.
  delivery-interval-minutes: 15

# ─────────────────────────────────────────────
#  Kit de Inicio (StarterKit)
# ─────────────────────────────────────────────
starter-kit:
  enabled: true
  # Ticks de espera tras el join antes de entregar el kit (100 = 5 segundos)
  delay-ticks: 100
  # Mensaje al jugador al recibir el kit (soporta códigos de color '&')
  welcome-message: "&8[&6&lDrakesCraft&8] &eKit de inicio entregado. ¡Bienvenido a la Odisea!"
  # Comandos a ejecutar en consola tras entregar el kit ({player} = nombre del jugador)
  commands:
    - "ps give novato {player} 1"
  # Lista de items del kit
  # Campos por item:
  #   material:      nombre del material en MAYÚSCULAS (ej. LEATHER_HELMET)
  #   amount:        cantidad (opcional, default 1)
  #   enchantments:  mapa de encantamiento: nivel (usa claves minecraft, ej. protection: 5)
  #   name:          nombre personalizado (opcional, soporta '&')
  #   lore:          lista de líneas de lore (opcional, soporta '&')
  items:
    # ── Armadura de cuero ──────────────────────────────
    - material: LEATHER_HELMET
      enchantments:
        protection: 5
        thorns: 3
        unbreaking: 10
        mending: 1
        respiration: 3
        aqua_affinity: 1

    - material: LEATHER_CHESTPLATE
      enchantments:
        protection: 5
        thorns: 3
        unbreaking: 10
        mending: 1

    - material: LEATHER_LEGGINGS
      enchantments:
        protection: 5
        thorns: 3
        unbreaking: 10
        mending: 1

    - material: LEATHER_BOOTS
      enchantments:
        protection: 5
        thorns: 3
        unbreaking: 10
        mending: 1
        feather_falling: 4
        depth_strider: 3

    # ── Herramientas ───────────────────────────────────
    - material: STONE_SWORD
      enchantments:
        sharpness: 5
        looting: 3
        fire_aspect: 2
        knockback: 2
        sweeping_edge: 3
        unbreaking: 10
        mending: 1
      name: "&fEspada del Guardia Inicial"
      lore:
        - "&8✦ Arma bendecida por Ares"
        - "&7Protección de los Dioses"
        - "&eDefiende tu primera odisea"
        - "&6No luchas solo, luchas por la Polis"

    - material: IRON_PICKAXE
      enchantments:
        efficiency: 5
        fortune: 3
        unbreaking: 10
        mending: 1
      name: "&fPico del Prospecto Divino"
      lore:
        - "&8✦ Herramienta consagrada por Hefesto"
        - "&7Abre camino hacia tu destino"

    - material: STONE_AXE
      enchantments:
        efficiency: 5
        sharpness: 5
        unbreaking: 10
        mending: 1
      name: "&fHacha del Forjador Sagrado"
      lore:
        - "&8✦ Filo forjado en hornos sagrados"
        - "&7Madera y acero bajo tu mando"

    - material: STONE_SHOVEL
      enchantments:
        efficiency: 5
        silk_touch: 1
        unbreaking: 10
        mending: 1
      name: "&fPala del Sendero Eterno"
      lore:
        - "&8✦ Paso firme en tierra desconocida"
        - "&7Allana rutas para tu equipo"

    - material: SHIELD
      enchantments:
        unbreaking: 10
        mending: 1
      name: "&bEscudo de la Polis"
      lore:
        - "&8✦ Muro sagrado de los héroes"
        - "&7El muro entre tú y el peligro"

    # ── Consumibles ────────────────────────────────────
    - material: BREAD
      amount: 24

    - material: COOKED_BEEF
      amount: 32

    - material: TORCH
      amount: 48

# ─────────────────────────────────────────────
#  ChatGames Scheduler
# ─────────────────────────────────────────────
chatgames:
  # Poner en false si ChatGames ya maneja su propio scheduler (automatic-games: true)
  enabled: false
  # Comando que se dispara — cambiar sin recompilar
  command: "chatgames force"
  # Rango de tiempo aleatorio para lanzar un juego (minutos)
  min-interval: 15
  max-interval: 30

# ─────────────────────────────────────────────
#  Leñador Loco
# ─────────────────────────────────────────────
lenador-loco:
  enabled: true
  target-name: "Leñador Loco"
  check-interval-seconds: 5
  effects:
    - type: RESISTANCE
      duration-seconds: 12
      amplifier: 1
    - type: REGENERATION
      duration-seconds: 12
      amplifier: 1
    - type: STRENGTH
      duration-seconds: 12
      amplifier: 0
    - type: SPEED
      duration-seconds: 12
      amplifier: 0

# ─────────────────────────────────────────────
#  Presencia y Eventos (DrakesLabPresence)
# ─────────────────────────────────────────────
presence:
  enabled: true
  # Identificador legible en mensajes (opcional, por defecto el del servidor)
  server-label: ""
  # Los heartbeats no se publican en Actualizaciones: Star Monitor es la fuente operativa.
  heartbeat:
    enabled: false
    interval-minutes: 15
  # Segundos de espera tras reload/arranque antes del primer POST
  startup-delay-seconds: 60
  # Eventos especificos a enviar
  events:
    server-startup: true
    server-shutdown: true
    player-join: false
    player-quit: false
    player-death: false
    advancement: false
    rate-limit-per-minute: 12

# ─────────────────────────────────────────────
#  Entrega Automática de Tienda (StoreManager)
# ─────────────────────────────────────────────
store:
  enabled: true
  # URL base de la API de la tienda (Fastify)
  api-url: "https://web.drakescraft.cl/api/store"
  # Clave API secreta (debe coincidir con STORE_API_KEY en el .env)
  api-key: "REPLACE_ME_STORE_API_KEY"
  # Frecuencia de verificación en segundos
  poll-interval-seconds: 60
  # Compatibilidad con el flujo antiguo. Purchase Engine usa purchase-engine.announcements.
  announcement-webhook-url: "REPLACE_ME_LEGACY_WEBHOOK"
  # Mensaje de felicitaciones en el chat in-game (Soporta códigos de color '&')
  chat-announcement: "&6&l⚡ &e¡Felicidades &b{player} &eha adquirido &a{product} &een la tienda! ¡Gracias por apoyar al servidor! &6&l⚡"
  # Mensaje del webhook de Discord
  discord-announcement: "🎉 **¡Felicidades {player} ha comprado {product} en el servidor! ¡Gracias por mantener el servidor vivo!** 🎉"
  # Sonido global emitido en el servidor ante compras
  global-sound:
    enabled: true
    sound: "UI_TOAST_CHALLENGE_COMPLETE"

  # Comandos a ejecutar por cada producto de la tienda
  # {player} se reemplazará por el nick exacto del jugador
  packages:
    hercules:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hercules 30d accumulate"
        - "eco give {player} 25000"
        - "kit hercules {player}"
        - "ps give viphercules {player} 1"
        - "msg {player} &a¡Gracias por comprar el rango Hércules!"
    hestia:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hestia 30d accumulate"
        - "eco give {player} 50000"
        - "kit hestia {player}"
        - "ps give viphestia {player} 1"
        - "msg {player} &a¡Gracias por comprar el rango Hestia!"
    hermes:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hermes 30d accumulate"
        - "eco give {player} 100000"
        - "kit hermes {player}"
        - "ps give viphermes {player} 1"
        - "msg {player} &a¡Gracias por comprar el rango Hermes!"
    hefesto:
      require-online: true
      commands:
        - "lp user {player} parent addtemp hefesto 30d accumulate"
        - "eco give {player} 175000"
        - "kit hefesto {player}"
        - "ps give viphefesto {player} 1"
        - "msg {player} &a¡Gracias por comprar el rango Hefesto!"
    artemisa:
      require-online: true
      commands:
        - "lp user {player} parent addtemp artemisa 30d accumulate"
        - "eco give {player} 300000"
        - "kit artemisa {player}"
        - "ps give vipartemisa {player} 1"
        - "msg {player} &a¡Gracias por comprar el rango Artemisa!"
    afrodita:
      require-online: true
      commands:
        - "lp user {player} parent addtemp afrodita 30d accumulate"
        - "eco give {player} 500000"
        - "kit afrodita {player}"
        - "ps give vipafrodita {player} 1"
        - "msg {player} &a¡Gracias por comprar el rango Afrodita!"
    zeus:
      require-online: true
      commands:
        - "lp user {player} parent addtemp zeus 30d accumulate"
        - "eco give {player} 1000000"
        - "kit zeus {player}"
        - "ps give vipzeus {player} 1"
        - "msg {player} &a¡Gracias por comprar el rango Zeus!"
    # Subrangos (Categoría 2)
    minero:
      require-online: true
      commands:
        - "lp user {player} parent addtemp minero 30d accumulate"
        - "kit minero {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Minero!"
    cazador:
      require-online: true
      commands:
        - "lp user {player} parent addtemp cazador 30d accumulate"
        - "kit cazador {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Cazador!"
    constructor:
      require-online: true
      commands:
        - "lp user {player} parent addtemp constructor 30d accumulate"
        - "kit constructor {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Constructor!"
    lenador:
      require-online: true
      commands:
        - "lp user {player} parent addtemp lenador 30d accumulate"
        - "kit lenador {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Leñador!"
    alquimista:
      require-online: true
      commands:
        - "lp user {player} parent addtemp alquimista 30d accumulate"
        - "kit alquimista {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Alquimista!"
    nomada:
      require-online: true
      commands:
        - "lp user {player} parent addtemp nomada 30d accumulate"
        - "kit nomada {player}"
        - "msg {player} &a¡Gracias por adquirir el rol de Nómada!"
    # Dragmas (Categoría 3 de la tienda web - 3 paquetes definidos)
    dragmas-saco:
      require-online: true
      commands:
        - "eco give {player} 50000"
        - "msg {player} &a¡Recibiste tu Saco de 50,000 Dragmas!"
    dragmas-cofre:
      require-online: true
      commands:
        - "eco give {player} 250000"
        - "msg {player} &a¡Recibiste tu Cofre de 250,000 Dragmas!"
    dragmas-anfora:
      require-online: true
      commands:
        - "eco give {player} 1000000"
        - "msg {player} &a¡Recibiste tu Ánfora de 1,000,000 Dragmas!"

# ╔══════════════════════════════════════════════╗
# ║   Spawn natural de jefes míticos (Odysseia)  ║
# ╚══════════════════════════════════════════════╝
# Invoca jefes aleatorios cerca de jugadores cada cierto tiempo.
# NO genera estructuras: solo aparece la entidad en la superficie.
# ─────────────────────────────────────────────
boss-balance:
  # Escala común para todos los jefes, incluidos ataques especiales y proyectiles.
  health-multiplier: 2.25
  damage-multiplier: 2.10
  movement-speed-multiplier: 1.60
  knockback-resistance: 0.95
  follow-range: 72.0
  # 40 ticks = 2 segundos. Las skills internas mantienen sus propios cooldowns.
  skill-interval-ticks: 40
  announcement-radius: 64.0
  dialogue-radius: 48.0
  # Escudo cinematográfico breve al cruzar cada fase; bloquea golpes durante el telegraph.
  phase-shield-ticks: 32
  combat-director:
    # Ataques comunes inspirados en encuentros por fases, limitados a una tarea pendiente por jefe.
    enabled: true
    target-range: 44.0
    cooldown-seconds: 9
    telegraph-ticks: 24
  mobility:
    # Teletransporte táctico: sólo flanquea jugadores lejanos y nunca carga chunks.
    enabled: true
    target-range: 56.0
    minimum-distance: 12.0
    flank-distance: 4.0
    cooldown-seconds: 7
  rebirth:
    # Renacen una vez al recibir daño letal. Prometeo conserva además su fénix propio.
    bosses: [thor, ares, hades, zeus, odin, kratos, heimdall, hidra, cerbero, tifon]
    health-percent: 0.55
    invulnerability-seconds: 5

#  Purchase Engine: anuncios de compras confirmadas
# ─────────────────────────────────────────────
# Este endpoint es privado: el valor real vive solo en la configuración desplegada.
purchase-engine:
  announcements:
    enabled: true
    webhook-url: "REPLACE_ME_PURCHASE_WEBHOOK"
    chat-announcement: "&6&l⚡ &e¡Felicidades &b{player} &eha adquirido &a{product} &een la tienda! ¡Gracias por apoyar al servidor! &6&l⚡"
    discord-announcement: "🎉 **¡Felicidades {player} ha comprado {product} en el servidor! ¡Gracias por mantener el servidor vivo!** 🎉"
    global-sound:
      enabled: true
      sound: "UI_TOAST_CHALLENGE_COMPLETE"

natural-spawn:
  # Activar/desactivar el spawn natural automático
  enabled: false
  # Cada cuántos segundos se hace un "intento" de spawn (mínimo 60)
  interval-seconds: 1800
  # Probabilidad (0.0 - 1.0) de que el intento tenga éxito
  chance: 0.25
  # Máximo de jefes naturales vivos al mismo tiempo
  max-active: 2
  # Distancia (en bloques) a la que aparece respecto al jugador elegido
  min-distance: 40
  max-distance: 80
  # Mundos permitidos (vacío = todos los mundos)
  worlds: []
  # Jefes elegibles (vacío = todos). Ej: [thor, hidra, cerbero, tifon]
  bosses: []

# ─────────────────────────────────────────────
#  Luna de Sangre: hordas controladas de Odysseia
# ─────────────────────────────────────────────
# Los zombies de este evento sólo rompen los bloques listados y JAMÁS dentro de
# ProtectionStones. Si la API de protecciones falla, la rotura queda desactivada.
blood-moon:
  enabled: true
  chance: 0.18
  worlds: [world]
  waves: 3
  wave-interval-seconds: 45
  zombies-per-player: 5
  max-zombies-per-wave: 18
  final-boss:
    enabled: true
    id: dios_corrupto
  zombie-block-breaking:
    enabled: true
    # Sin cofres, máquinas, estaciones ni bloques de Slimefun: sólo terreno blando.
    allowed-materials:
      - DIRT
      - COARSE_DIRT
      - ROOTED_DIRT
      - GRASS_BLOCK
      - SAND
      - RED_SAND
      - GRAVEL
      - CLAY
      - SNOW
      - OAK_LEAVES
      - SPRUCE_LEAVES
      - BIRCH_LEAVES
      - JUNGLE_LEAVES
      - ACACIA_LEAVES
      - DARK_OAK_LEAVES
      - MANGROVE_LEAVES
      - CHERRY_LEAVES
      - AZALEA_LEAVES
      - FLOWERING_AZALEA_LEAVES
  slimefun-loot:
    # Un sólo drop aleatorio por zombie, con probabilidad baja.
    chance: 0.10
    item-ids: [IRON_DUST, COPPER_DUST, GOLD_DUST, ZINC_DUST, ALUMINUM_DUST]

# ─────────────────────────────────────────────
#  Recompensas de jefes míticos
# ─────────────────────────────────────────────
# Cada drop se sortea una vez por muerte y se entrega a un participante
# ponderado por daño. Los valores son probabilidades entre 0.0 y 1.0.
boss-loot:
  enabled: true
  experience: 750
  contributors:
    # Daño mínimo y porcentaje mínimo del daño total para entrar al sorteo.
    minimum-damage: 25.0
    minimum-share: 0.02
  bosses:
    circe:
      drops:
        circe_staff: 0.50
    polifemo:
      drops:
        polifemo_club: 0.50
    dios_corrupto:
      drops:
        corrupted_god_blade: 0.50
    thor:
      drops:
        mjolnir: 0.50
    ares:
      drops:
        ares_blade: 0.50
        ares_shield: 0.50
    hades:
      drops:
        hades_scythe: 0.50
    poseidon:
      drops:
        poseidon_trident: 0.50
    zeus:
      drops:
        zeus_mace: 0.50
    loki:
      drops:
        loki_dagger: 0.50
        loki_scepter: 0.50
    odin:
      drops:
        odin_spear: 0.50
        odin_helmet: 0.50
    kratos:
      drops:
        kratos_blade: 0.50
        leviathan_axe: 0.50
    heimdall:
      drops:
        gjallarhorn: 0.50
        bifrost_wings: 0.50
    hidra:
      drops:
        hydra_fang: 0.50
        hydra_scale: 0.50
    cerbero:
      drops:
        cerbero_hide: 0.50
    artemisa:
      drops:
        artemis_bow: 0.50
    tifon:
      drops:
        tifon_claw: 0.50
        tifon_chest: 0.50
    prometeo:
      drops:
        prometeo_flame: 0.50

# ─────────────────────────────────────────────
#  Sistema de Kits VIP e Integraciones (Slimefun)
# ─────────────────────────────────────────────
sfmaster-policy:
  max-claims: 12
  window-minutes: 60
  blocked-addons:
    - "SUPREME"
    - "INFINITYEXPANSION"
  blocked-id-prefixes:
    - "SUPREME_"
    - "INFINITY_"
  blocked-id-fragments:
    - "_SWORD"
    - "_PICKAXE"
    - "_AXE"
    - "_SHOVEL"
    - "_HOE"
    - "_HELMET"
    - "_CHESTPLATE"
    - "_LEGGINGS"
    - "_BOOTS"
    - "_ARMOR"
    - "_BOW"
    - "_CROSSBOW"
    - "_TRIDENT"
    - "_STAFF"
    - "_HAMMER"
    - "_DRILL"
    - "_MULTITOOL"
    - "_SHIELD"
    - "_ELYTRA"
  blocked-materials:
    - "DIAMOND"
    - "DIAMOND_BLOCK"
    - "EMERALD"
    - "EMERALD_BLOCK"
    - "NETHERITE_INGOT"
    - "NETHERITE_BLOCK"
    - "ANCIENT_DEBRIS"

chat-filter:
  enabled: true
  words:
    - "ctm"
    - "conchetumare"
    - "conchatumare"
    - "culiao"
    - "hijo de puta"
    - "hdp"
    - "pelotudo"
    - "puta madre"
    - "mierda"
    - "maricon"
    - "negro de mierda"
    - "mogolico"

# Traducción automática por locale; reemplaza drakes_translation.dsc.
translation:
  enabled: true
  join-delay-ticks: 60

